services:
  cli:
    image: hyperledger/fabric-tools:2.5
    container_name: cli
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.org1.net:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/org1.net/users/Admin@org1.net/msp
      - CORE_TLS_ENABLED=false
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    volumes:
      - ./organizations:/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations
      - ./chaincode:/opt/gopath/src/github.com/hyperledger/fabric/peer/chaincode
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - fabric
    depends_on:
      - peer0.org1.net
      - orderer.net

  couchdb0:
    image: couchdb:3.3.2
    container_name: couchdb0
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    networks:
      - fabric
    volumes:
      - couchdb0_data:/opt/couchdb/data

  peer0.org1.net:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.org1.net
    environment:
      - CORE_PEER_ID=peer0.org1.net
      - CORE_PEER_ADDRESS=peer0.org1.net:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.net:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.net:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.net:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_TLS_ENABLED=false
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - GODEBUG=netdns=go
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric
    working_dir: /root
    command: peer node start
    volumes:
      - ./organizations/peerOrganizations/org1.net/peers/peer0.org1.net/msp:/etc/hyperledger/fabric/msp
      - peer0.org1.net:/var/hyperledger/production
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "7051:7051"
      - "7052:7052"
      - "7053:7053"
    networks:
      - fabric
    depends_on:
      - couchdb0
      - orderer.net

  orderer.net:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.net
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - ORDERER_HOME=/var/hyperledger/orderer
      - ORDERER_HOST=orderer.net
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_LISTENPORT=7050
      - ORDERER_GENESISMETHOD=file
      - ORDERER_GENESISFILE=/etc/hyperledger/fabric/genesisblock
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/etc/hyperledger/fabric/msp
      - ORDERER_GENERAL_TLS_ENABLED=false
      - ORDERER_FILELEDGER_LOCATION=/var/hyperledger/orderer/data
    working_dir: /root
    command: orderer
    volumes:
      - ./channel-artifacts/genesis.block:/etc/hyperledger/fabric/genesisblock
      - ./organizations/ordererOrganizations/net/orderers/orderer.net/msp:/etc/hyperledger/fabric/msp
      - orderer.net:/var/hyperledger/orderer/data
    ports:
      - "7050:7050"
    networks:
      - fabric

networks:
  fabric:
    external: true

volumes:
  couchdb0_data:
  peer0.org1.net:
  orderer.net:
